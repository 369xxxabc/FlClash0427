name: Build Android Custom (com.antutu.ABenchMark)

on:
  workflow_dispatch:      # 手动触发（推荐）
    inputs:
      ref:
        description: 'Branch or tag to build (default: main)'
        required: false
        default: 'main'
  push:
    branches: [ main ]    # 可选：推送到 main 时也触发（测试用）

env:
  PACKAGE_NAME: "com.antutu.ABenchMark"

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}
          submodules: recursive

      # ==================== 修改包名（核心步骤） ====================
      - name: Change Android package name to ${{ env.PACKAGE_NAME }}
        run: |
          echo "Changing package name to ${{ env.PACKAGE_NAME }} ..."

          # 1. 修改 build.gradle
          sed -i 's/applicationId ".*"/applicationId "${{ env.PACKAGE_NAME }}"/' android/app/build.gradle || true
          sed -i 's/applicationId = ".*"/applicationId = "${{ env.PACKAGE_NAME }}"/' android/app/build.gradle.kts || true

          # 2. 修改 AndroidManifest.xml
          sed -i 's/package="[^"]*"/package="${{ env.PACKAGE_NAME }}"/' android/app/src/main/AndroidManifest.xml

          # 3. 替换所有 com.follow.clash 为新包名（防止 intent、authority 冲突）
          grep -rl "com.follow.clash" android/ --include="*.xml" --include="*.kt" --include="*.java" | xargs sed -i "s|com\.follow\.clash|${{ env.PACKAGE_NAME }}|g" || true

          # 4. 修改 app 显示名称（可选，改为 AnTuTu Benchmark）
          sed -i 's/<string name="app_name">[^<]*<\/string>/<string name="app_name">AnTuTu Benchmark<\/string>/' android/app/src/main/res/values/strings.xml || true

          echo "Package name changed successfully."

      # ==================== 环境准备 ====================
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      # ==================== Android 签名准备（可选） ====================
      # 如果你想签名（推荐），请先在仓库 Settings → Secrets and variables → Actions 中添加以下 secrets：
      # KEYSTORE (base64 编码的 keystore.jks)
      # KEY_ALIAS, STORE_PASSWORD, KEY_PASSWORD
      - name: Setup Android Signing (if secrets exist)
        if: ${{ env.KEYSTORE != '' }}
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}

      # ==================== 执行构建（只构建 Android） ====================
      - name: Build Android with setup.dart
        run: dart setup.dart android

      # ==================== 上传 APK ====================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlClash-Android-com.antutu.ABenchMark
          path: ./dist/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: List built files
        run: ls -lh ./dist/