name: Build Android Custom (com.antutu.ABenchMark)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build (default: main)'
        required: false
        default: 'main'

env:
  PACKAGE_NAME: "com.antutu.ABenchMark"

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}
          submodules: recursive

      # ==================== 1. 先设置 Flutter（必须第一步） ====================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.35.7'
          cache: true

      # ==================== 2. Flutter Pub Get（修复依赖错误的关键） ====================
      - name: Flutter Pub Get
        run: flutter pub get

      # ==================== 3. 修改包名（必须在 pub get 之后） ====================
      - name: Change package name to ${{ env.PACKAGE_NAME }}
        run: |
          echo "🔄 Changing package name to ${{ env.PACKAGE_NAME }}"

          # 修改 applicationId
          find android -name "build.gradle*" -exec sed -i 's/applicationId ["'\''][^"'\'']*["'\'']/applicationId "${{ env.PACKAGE_NAME }}"/g' {} + || true
          find android -name "build.gradle*" -exec sed -i 's/applicationId = ["'\''][^"'\'']*["'\'']/applicationId = "${{ env.PACKAGE_NAME }}"/g' {} + || true

          # 修改 Manifest package
          sed -i 's/package="[^"]*"/package="${{ env.PACKAGE_NAME }}"/' android/app/src/main/AndroidManifest.xml || true

          # 全局替换 com.follow.clash（非常重要）
          grep -rl "com\.follow\.clash" android/ 2>/dev/null | xargs sed -i "s|com\.follow\.clash|${{ env.PACKAGE_NAME }}|g" || true

          # 修改 App 名称
          sed -i 's/<string name="app_name">[^<]*<\/string>/<string name="app_name">AnTuTu Benchmark<\/string>/' \
            android/app/src/main/res/values/strings.xml || true

          echo "✅ Package name changed successfully."

      # ==================== 4. Go 环境 ====================
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      # ==================== 5. 执行构建 ====================
      - name: Build Android (dart setup.dart android)
        run: dart setup.dart android

      # ==================== 6. 上传 APK ====================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlClash-Android-com.antutu.ABenchMark
          path: |
            ./dist/*.apk
            ./build/app/outputs/flutter-apk/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Show built files
        if: always()
        run: |
          echo "=== Built files ==="
          ls -lh ./dist/ 2>/dev/null || true
          ls -lh ./build/app/outputs/flutter-apk/ 2>/dev/null || true