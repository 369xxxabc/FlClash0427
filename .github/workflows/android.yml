name: FlClash Android Final Fix

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # 固定使用一个相对兼容的版本，或者保持 stable
          channel: 'stable'
          cache: true

      - name: Patch Dependencies & Package Name
        run: |
          echo "1. 修复版本冲突 (material_color_utilities)..."
          # 直接强制修改 pubspec.yaml，将不兼容的版本号改为符合 SDK 要求的 0.13.0
          sed -i 's/material_color_utilities: ^0.11.1/material_color_utilities: ^0.13.0/g' pubspec.yaml
          
          echo "2. 修复 yaml_writer 依赖..."
          # 针对之前那个报错的 git 依赖，直接强制换成 pub 官方版
          sed -i '/yaml_writer:/,+3d' pubspec.yaml
          sed -i '/dependencies:/a \  yaml_writer: ^2.0.0' pubspec.yaml

          echo "3. 正在修改包名为 com.antutu.ABenchMark..."
          OLD_ID="com.example.flclash"
          NEW_ID="com.antutu.ABenchMark"
          
          # 修改 Android 构建配置
          find android -name "build.gradle" -exec sed -i "s/applicationId \"$OLD_ID\"/applicationId \"$NEW_ID\"/g" {} +
          find android -name "build.gradle" -exec sed -i "s/namespace \"$OLD_ID\"/namespace \"$NEW_ID\"/g" {} +
          find android -name "AndroidManifest.xml" -exec sed -i "s/package=\"$OLD_ID\"/package=\"$NEW_ID\"/g" {} +
          
          # 修改源码中的包名引用
          find . -type f \( -name "*.kt" -o -name "*.java" -o -name "*.dart" \) -not -path "*/.pub-cache/*" | xargs sed -i "s/$OLD_ID/$NEW_ID/g" || true

          echo "4. 清理旧缓存..."
          rm -f pubspec.lock

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          # 编译 APK，加入 --no-tree-shake-icons 增加稳定性
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlClash-Antutu-Success
          path: build/app/outputs/flutter-apk/app-release.apk
