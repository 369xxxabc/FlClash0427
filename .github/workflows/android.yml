name: Ultimate Auto Android Build

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # 尝试拉取可能存在的子模块

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Hard-Fix Dependencies & Package Name
        run: |
          echo "1. 修复路径依赖和坏掉的 Git 依赖..."
          
          # 修复 tray_manager: 从本地路径改为远程版本
          sed -i '/tray_manager:/,+2d' pubspec.yaml
          sed -i '/dependencies:/a \  tray_manager: ^0.2.4' pubspec.yaml
          
          # 修复 window_manager: (通常和 tray_manager 一起出现，预防万一)
          sed -i '/window_manager:/,+2d' pubspec.yaml
          sed -i '/dependencies:/a \  window_manager: ^0.4.3' pubspec.yaml

          # 修复之前报错的 yaml_writer
          sed -i '/yaml_writer:/,+3d' pubspec.yaml
          sed -i '/dependencies:/a \  yaml_writer: ^2.0.0' pubspec.yaml
          
          echo "2. 正在全量替换包名为 com.antutu.ABenchMark..."
          OLD_ID="com.example.flclash"
          NEW_ID="com.antutu.ABenchMark"
          
          # 替换 build.gradle 里的 ID 和 namespace
          find android -name "build.gradle" -exec sed -i "s/applicationId \"$OLD_ID\"/applicationId \"$NEW_ID\"/g" {} +
          find android -name "build.gradle" -exec sed -i "s/namespace \"$OLD_ID\"/namespace \"$NEW_ID\"/g" {} +
          
          # 替换清单文件
          find android -name "AndroidManifest.xml" -exec sed -i "s/package=\"$OLD_ID\"/package=\"$NEW_ID\"/g" {} +
          
          # 替换源码引用
          grep -rl "$OLD_ID" . | xargs sed -i "s/$OLD_ID/$NEW_ID/g" || true

          echo "依赖补丁与包名修改已完成。"

      - name: Get Dependencies
        run: |
          flutter pub pubcache repair || true # 清理缓存防止干扰
          flutter pub get

      - name: Build APK
        run: |
          # 使用 --no-tree-shake-icons 避免部分图标库编译失败
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlClash-Modified-APK
          path: build/app/outputs/flutter-apk/app-release.apk
