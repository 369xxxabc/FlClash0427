name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 手动运行按钮

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: 1. 修复说明书 (Python)
        run: |
          python3 -c "
          import sys
          with open('pubspec.yaml', 'r') as f:
              lines = f.readlines()
          with open('pubspec.yaml', 'w') as f:
              skip = False
              for line in lines:
                  if 'yaml_writer:' in line:
                      f.write('  yaml_writer: ^2.0.0\n')
                      skip = True
                  elif skip and ('git:' in line or 'url:' in line or 'ref:' in line or '    ' in line):
                      continue
                  else:
                      skip = False
                      f.write(line)
          "

      - name: 2. 准备零件 (pub get)
        run: flutter pub get

      - name: 3. 基础设置 (setup.dart)
        run: dart setup.dart android || true

      - name: 4. 核弹级包名全局替换 (针对 com.follow.clash.dev)
        run: |
          # 核心：地毯式搜索。针对你截图显示的这个具体包名，全项目搜索并替换
          # 无论是 .gradle, .xml, .kt, .dart 还是配置文件，见一个改一个
          grep -rl "com.follow.clash.dev" . | xargs sed -i 's/com.follow.clash.dev/com.antutu.ABenchMark/g' || true
          grep -rl "com.follow.clash" . | xargs sed -i 's/com.follow.clash/com.antutu.ABenchMark/g' || true
          
          # 针对 build.gradle 里的关键字段再次强力补刀（兼容单双引号）
          find . -name "build.gradle" -exec sed -i "s/applicationId [\"'].*[\"']/applicationId \"com.antutu.ABenchMark\"/g" {} +
          find . -name "namespace [\"'].*[\"']/namespace \"com.antutu.ABenchMark\"/g" {} +
          
          # 针对 AndroidManifest.xml 强力覆盖
          find . -name "AndroidManifest.xml" -exec sed -i 's/package="[^"]*"/package="com.antutu.ABenchMark"/g' {} +
          
          # 强制将签名改为 debug，确保即使没有秘钥也能安装
          find . -name "build.gradle" -exec sed -i 's/signingConfig signingConfigs.release/signingConfig signingConfigs.debug/g' {} +
          
          echo "✅ 包名已进行地毯式强改！"

      - name: 5. 正式打包 (强制开启伪装)
        run: |
          # 编译 release 版，专门针对 arm64 架构
          flutter build apk --release --target-platform android-arm64 --no-tree-shake-icons

      - name: 6. 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: FLClash-AnTuTu-Spoof
          path: build/app/outputs/flutter-apk/*.apk
          overwrite: true
