name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 手动按钮

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: 1. 修复说明书 (Python)
        run: |
          python3 -c "
          import sys
          with open('pubspec.yaml', 'r') as f:
              lines = f.readlines()
          with open('pubspec.yaml', 'w') as f:
              skip = False
              for line in lines:
                  if 'yaml_writer:' in line:
                      f.write('  yaml_writer: ^2.0.0\n')
                      skip = True
                  elif skip and ('git:' in line or 'url:' in line or 'ref:' in line or '    ' in line):
                      continue
                  else:
                      skip = False
                      f.write(line)
          "

      - name: 2. 准备零件 (pub get)
        run: flutter pub get

      - name: 3. 基础设置 (setup.dart)
        run: dart setup.dart android || true

      - name: 4. 地毯式包名强改
        run: |
          # 针对你截图里的旧包名，进行全项目无死角替换
          # 第一轮：替换所有出现的字符串
          grep -rl "com.follow.clash.dev" . | xargs sed -i 's/com.follow.clash.dev/com.antutu.ABenchMark/g' || true
          grep -rl "com.follow.clash" . | xargs sed -i 's/com.follow.clash/com.antutu.ABenchMark/g' || true
          
          # 第二轮：专门针对 build.gradle 里的关键字段（修复了语法错误）
          find . -name "build.gradle" -type f -exec sed -i 's/applicationId .*/applicationId "com.antutu.ABenchMark"/g' {} +
          find . -name "build.gradle" -type f -exec sed -i 's/namespace .*/namespace "com.antutu.ABenchMark"/g' {} +
          
          # 第三轮：针对 AndroidManifest.xml 强行覆盖 package 属性
          find . -name "AndroidManifest.xml" -type f -exec sed -i 's/package="[^"]*"/package="com.antutu.ABenchMark"/g' {} +
          
          # 第四轮：强行改签名，确保能顺利打包
          find . -name "build.gradle" -type f -exec sed -i 's/signingConfig signingConfigs.release/signingConfig signingConfigs.debug/g' {} +
          
          echo "✅ 语法错误已修复，包名强改完成！"

      - name: 5. 暴力打包
        run: |
          # 绕过复杂的脚本，直接用 Flutter 官方命令打包
          flutter build apk --release --target-platform android-arm64 --no-tree-shake-icons

      - name: 6. 上传包
        uses: actions/upload-artifact@v4
        with:
          name: FLClash-AnTuTu-Spoof
          path: build/app/outputs/flutter-apk/*.apk
          overwrite: true