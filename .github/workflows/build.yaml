name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 手动运行按钮

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android Signing
        run: |
          mkdir -p android/app
          # 即使没有密钥也生成占位文件，保证流程不中断
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks || touch android/app/keystore.jks
          echo "keyAlias=test" > android/local.properties
          echo "storePassword=test" >> android/local.properties
          echo "keyPassword=test" >> android/local.properties

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          # 调回最新稳定版，确保 Dart 版本足够高
          flutter-version: 3.35.7 
          cache: true

      - name: 彻底修复说明书 (Python 核弹版)
        run: |
          # 使用 Python 精准剔除坏掉的 yaml_writer 依赖，不管它有几行
          python3 -c "
          import sys
          with open('pubspec.yaml', 'r') as f:
              lines = f.readlines()
          with open('pubspec.yaml', 'w') as f:
              skip = False
              for line in lines:
                  if 'yaml_writer:' in line:
                      f.write('  yaml_writer: ^2.0.0\n')
                      skip = True # 开始跳过后面坏掉的 git 块
                  elif skip and ('git:' in line or 'url:' in line or 'ref:' in line or '    ' in line):
                      continue # 继续跳过缩进的内容
                  else:
                      skip = False
                      f.write(line)
          "
          echo "✅ pubspec.yaml 已通过 Python 脚本完美修复！"

      - name: 全球搜索并替换包名
        run: |
          # 修改包名为安兔兔
          find . -name "build.gradle" -exec sed -i 's/applicationId ".*"/applicationId "com.antutu.ABenchMark"/g' {} +
          find . -name "AndroidManifest.xml" -exec sed -i 's/package=".*"/package="com.antutu.ABenchMark"/g' {} +
          find . -name "MainActivity.kt" -exec sed -i 's/package .*/package com.antutu.ABenchMark/g' {} +
          find . -name "MainActivity.java" -exec sed -i 's/package .*/package com.antutu.ABenchMark/g' {} +
          echo "✅ 包名已替换为 com.antutu.ABenchMark"

      - name: Get Flutter Dependency
        run: |
          flutter pub get

      - name: Setup Project
        run: dart setup.dart android

      - name: Build APK (Release)
        run: |
          # 编译 arm64 版本的 APK
          flutter build apk --release --target-platform android-arm64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FLClash-AnTuTu-Edition
          path: build/app/outputs/flutter-apk/app-release.apk
          overwrite: true
