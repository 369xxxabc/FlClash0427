name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 手动运行按钮

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: 1. 修复说明书 (Python 脚本)
        run: |
          python3 -c "
          import sys
          with open('pubspec.yaml', 'r') as f:
              lines = f.readlines()
          with open('pubspec.yaml', 'w') as f:
              skip = False
              for line in lines:
                  if 'yaml_writer:' in line:
                      f.write('  yaml_writer: ^2.0.0\n')
                      skip = True
                  elif skip and ('git:' in line or 'url:' in line or 'ref:' in line or '    ' in line):
                      continue
                  else:
                      skip = False
                      f.write(line)
          "

      - name: 2. 准备零件 (pub get)
        run: flutter pub get

      - name: 3. 运行原始初始化 (不打包，只跑基础设置)
        run: dart setup.dart android || true # 就算这一步报错也继续往下走

      - name: 4. 暴力修改包名为安兔兔 (只改身份证，不改代码)
        run: |
          # 只修改 build.gradle 里的 applicationId，这就能骗过系统
          find . -name "build.gradle" -exec sed -i 's/applicationId ".*"/applicationId "com.antutu.ABenchMark"/g' {} +
          # 强制把签名设置改为 debug 版，这样就算你没有配置 Secrets 也能打包成功
          find . -name "build.gradle" -exec sed -i 's/signingConfig signingConfigs.release/signingConfig signingConfigs.debug/g' {} +
          echo "✅ 身份伪装已完成！"

      - name: 5. 开始正式打包 (不使用报错的脚本)
        run: |
          # 直接使用 Flutter 原生命令打包，绕过 setup.dart
          flutter build apk --release --target-platform android-arm64 --no-tree-shake-icons

      - name: 6. 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: FLClash-AnTuTu-Spoof
          path: build/app/outputs/flutter-apk/*.apk
          overwrite: true
