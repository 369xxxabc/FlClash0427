name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 手动运行开关

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: android
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android Signing
        if: startsWith(matrix.platform,'android')
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks || true
          echo "${{ secrets.SERVICE_JSON }}" | base64 --decode > android/app/google-services.json || true
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties || true
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties || true
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties || true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.0
          cache: true

      - name: 修复依赖包和自动改包名
        run: |
          # 1. 修复那个坏掉的依赖包链接
          find . -name "pubspec.yaml" -exec sed -i 's|https://github.com/chen08209/yaml_writer.*|yaml_writer: ^2.0.0|g' {} +
          
          # 2. 全量搜索并修改 build.gradle 里的 applicationId
          find . -name "build.gradle" -exec sed -i 's/applicationId ".*"/applicationId "com.antutu.ABenchMark"/g' {} +
          
          # 3. 全量搜索并修改 AndroidManifest 里的 package
          find . -name "AndroidManifest.xml" -exec sed -i 's/package=".*"/package="com.antutu.ABenchMark"/g' {} +
          
          # 4. 全量搜索并修改 Kotlin/Java 代码里的包名声明
          find . -name "MainActivity.kt" -exec sed -i 's/package .*/package com.antutu.ABenchMark/g' {} +
          find . -name "MainActivity.java" -exec sed -i 's/package .*/package com.antutu.ABenchMark/g' {} +
          
          echo "✅ 依赖修复与包名修改全部完成！"

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter pub get

      - name: Setup
        run: dart setup.dart ${{ matrix.platform }} ${{ matrix.arch && format('--arch {0}', matrix.arch) }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist
          overwrite: true
