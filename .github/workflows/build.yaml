name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 手动运行按钮

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android Signing
        run: |
          # 即使没有配置密钥，也创建空文件防止报错
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks || touch android/app/keystore.jks
          echo "${{ secrets.SERVICE_JSON }}" | base64 --decode > android/app/google-services.json || touch android/app/google-services.json
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties || echo "keyAlias=test" >> android/local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties || echo "storePassword=test" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties || echo "keyPassword=test" >> android/local.properties

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.0
          cache: true

      - name: 彻底修复说明书和包名
        run: |
          # 1. 强力清除坏掉的 yaml_writer 依赖块（包括多余的 ref: master）
          # 我们先删除包含 yaml_writer 及其后 3 行的所有内容
          sed -i '/yaml_writer:/,+3d' pubspec.yaml
          
          # 2. 在 dependencies 关键词下面重新插入一行干净的依赖
          sed -i '/dependencies:/a \  yaml_writer: ^2.0.0' pubspec.yaml
          
          # 3. 全局修改包名为 com.antutu.ABenchMark
          find . -name "build.gradle" -exec sed -i 's/applicationId ".*"/applicationId "com.antutu.ABenchMark"/g' {} +
          find . -name "AndroidManifest.xml" -exec sed -i 's/package=".*"/package="com.antutu.ABenchMark"/g' {} +
          
          # 4. 修改代码中的包名声明
          find . -name "MainActivity.kt" -exec sed -i 's/package .*/package com.antutu.ABenchMark/g' {} +
          find . -name "MainActivity.java" -exec sed -i 's/package .*/package com.antutu.ABenchMark/g' {} +
          
          echo "✅ 坏掉的零件已剔除，新包名已植入！"

      - name: Get Flutter Dependency
        run: |
          flutter pub get

      - name: Setup
        run: dart setup.dart ${{ matrix.platform }}

      - name: Build APK
        run: |
          flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-android
          path: build/app/outputs/flutter-apk/*.apk
          overwrite: true
